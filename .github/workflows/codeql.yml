name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * 1'

jobs:
  analyze:
    name: Analyze (cpp)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive

      - uses: github/codeql-action/init@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
        with:
          languages: cpp
          build-mode: manual
          queries: security-and-quality
          config: |
            paths-ignore:
              # Vendored third-party code — not ours to fix
              - main/src/mesh/serialization/nanopb
              - main/lib/lattice-protocol
              # Build tree (FetchContent-downloaded googletest sources)
              - tests/build

      - name: Install CMake
        run: sudo apt-get install -y cmake

      - name: Build for CodeQL
        # Build only the lattice_e2e target: it compiles the full firmware
        # (FIRMWARE_SOURCES) once, which is all CodeQL needs to analyze main/src.
        # Building all 9 test executables re-compiles the firmware + mbedtls +
        # gtest per target and, fully parallel, OOM-kills the 2-core runner
        # (SIGTERM 143). Cap parallelism to 2 to keep peak memory bounded.
        run: |
          cmake -B tests/build tests/ -DCMAKE_BUILD_TYPE=Release
          cmake --build tests/build --target lattice_e2e --parallel 2

      - uses: github/codeql-action/analyze@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
        with:
          category: '/language:cpp'
