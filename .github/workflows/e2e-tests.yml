name: E2E Tests

# Manual-only for now: the multi-node mesh simulation suite (ctest label "e2e")
# is run on demand from the Actions tab. Move to per-PR once runtime and
# stability are proven; the unit-test CI already excludes this label.
on:
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive

      - name: Install CMake
        run: sudo apt-get install -y cmake

      - name: Configure
        run: cmake -B tests/build tests/ -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build tests/build --parallel

      - name: Run e2e tests
        run: ctest --test-dir tests/build --output-on-failure --label-regex e2e

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-test-results
          path: tests/build/Testing/
