name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          submodules: recursive

      - name: Install CMake
        run: sudo apt-get install -y cmake

      - name: Configure
        run: cmake -B tests/build tests/ -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build tests/build --parallel

      - name: Run tests
        # Exclude the e2e simulation suite (label "e2e") — it runs in its own
        # "E2E Tests" workflow (see e2e-tests.yml) so the two stay independently
        # scoped; this job stays unit-only.
        run: ctest --test-dir tests/build --output-on-failure --parallel 4 --label-exclude e2e

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results
          path: tests/build/Testing/

  lint-format:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install clang-format
        run: sudo apt-get install -y clang-format

      - name: Check formatting
        run: |
          find main/src \( -name '*.cpp' -o -name '*.h' \) \
            ! -path '*/nanopb/*' \
            ! -name 'mesh.pb.h' \
            ! -name 'mesh.pb.c' | \
            xargs clang-format --style=file --dry-run --Werror

  static-analysis:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          submodules: recursive

      - name: Install cppcheck
        run: sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          cppcheck \
            --error-exitcode=1 \
            --suppress=missingIncludeSystem \
            --suppress=unmatchedSuppression \
            --inline-suppr \
            -I main/src \
            -i main/src/mesh/serialization/nanopb \
            -i main/src/mesh/serialization/mesh.pb.c \
            main/src/ 2>&1
